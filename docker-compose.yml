services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: es-demo
    environment:
      - node.name=es-demo
      - cluster.name=es-demo-cluster
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      # Set low watermark thresholds so we can simulate "disk full"
      - cluster.routing.allocation.disk.watermark.low=70%
      - cluster.routing.allocation.disk.watermark.high=75%
      - cluster.routing.allocation.disk.watermark.flood_stage=80%
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

volumes:
  esdata:
